var mydatasets_prot = [];
var barChart = null;

function plot_prot() {

  mydatasets_prot = [];

  const genename_prot = document.getElementById("gene_name_prot").value.trim();

  let found = false;
  let max = 0;

  for (let k = 0; k < kinases.datasets.length; k++) {

    const gene_name_list_prot = kinases.datasets[k].genenames;
    const gene_name_toUniprot = kinases.datasets[k].protnames;

    const match =
      genename_prot !== "" &&
      (
        genename_prot.toLowerCase() === gene_name_list_prot.toLowerCase() ||
        genename_prot.toLowerCase() === gene_name_toUniprot.toLowerCase()
      );

    if (match) {

      found = true;


      const dataArray = kinases.datasets[k].Cscore;

      mydatasets_prot = [{
        label: "PROT",
        data: dataArray,
        borderWidth: 1,
        borderColor: "black",
        backgroundColor: lineageColorVector
      }];

      max = Math.max(...dataArray);
      break;
    }
  }

  if (!found) {

    return; // stop here so chart doesn't render garbage
  }
  document.getElementById("chart-title").textContent =
    `CScore by Cell Line — ${genename_prot}`;
  
  const ctx = document.getElementById("bar_chart").getContext("2d");

  if (barChart) {
    barChart.destroy();
  }
  


  barChart = new Chart(ctx, {
    type: "bar",
    data: {
      labels: [
        "T24", "U-2 OS", "BT-474", "MCF-10A", "MDA-MB-231", "DLD-1", "HT-29", "HFF-1",
        "RD", "MIO-M1", "RPE", "HeLa", "NT2", "OVCAR-3", "HCM",

        "A549", "A172", "NB1", "SH-SY5Y", "MIA PaCa-2", "HaCat",
        "iPSCs", "ML-1", "HUVEC"
      ],
      datasets: mydatasets_prot
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      legend: { display: false },

        callbacks: {

            const index = tooltipItems[0].index;

    // create chip
    function addSelectedItem(value) {
      const div = document.createElement("div");
      div.className = "selected-item";
      div.dataset.value = value;

      div.innerHTML = `
    <span>${value}</span>
    <button aria-label="Remove">×</button>
  `;

      div.querySelector("button").addEventListener("click", () => {
        selectedValues.delete(value);
        div.remove();
      });

      selectedContainer.appendChild(div);
    }
    // use this before plotting
    function getSelectedCellLines() {
      return Array.from(selectedValues);

function plotRank(selectedCLs, geneFilter) {

    if (!selectedCLs || selectedCLs.length === 0) return;

    const refCell = selectedCLs[0];
    const refIndex = kinases.cellLines.indexOf(refCell);

    if (refIndex === -1) {
        console.error("Reference cell line not found:", refCell);
        return;
    }

    const datasets = kinases.datasets;

    // 1. build ranking (based on reference cell line)
    let ranked = datasets.map(d => ({
        name: d.genenames,
        refScore: d.Cscore[refIndex]
    }));

    ranked = ranked.filter(p => p.refScore !== 0);
    ranked.sort((a, b) => b.refScore - a.refScore);

    const x = ranked.map(p => p.name);

    // 2. find gene index for highlight
    let highlightIndex = -1;

    if (geneFilter && geneFilter.length > 0) {
        const geneUpper = geneFilter.toUpperCase();

        highlightIndex = ranked.findIndex(p =>
            p.name.toUpperCase().includes(geneUpper)
        );
    }

    // 3. build traces
    const traces = [];

    selectedCLs.forEach(cellLine => {
        const idx = kinases.cellLines.indexOf(cellLine);
        if (idx === -1) return;

        const scoreMap = new Map(
            datasets.map(d => [d.genenames, d.Cscore[idx]])
        );

        const y = ranked.map(p => scoreMap.get(p.name) ?? 0);

        traces.push({
            x,
            y,
            mode: "lines+markers",
            type: "scatter",
            name: cellLine,
            hovertemplate: "%{x}<br>Cscore: %{y}<extra></extra>"
        });
    });

    // 4. vertical highlight line
    const shapes = [];

    if (highlightIndex !== -1) {
        shapes.push({
            type: "line",
            x0: ranked[highlightIndex].name,
            x1: ranked[highlightIndex].name,
            y0: 0,
            y1: 1,
            yref: "paper",
            line: {
                color: "red",
                width: 2,
                dash: "dash"
            }
        });
    }
const plotLayoutDefaults = {
    autosize: true,
    margin: { t: 40, l: 50, r: 20, b: 120 }
};
const layout = {
    ...plotLayoutDefaults,
    title: `Kinase Ranking (reference: ${refCell})`,
    xaxis: { tickangle: -45 },
    yaxis: { title: "Cscore" },
    shapes: shapes,
    legend: { orientation: "h" },
    autosize: true,

};
Plotly.newPlot("plotDiv", traces, layout).then(gd => {

  });
});

/* ================= SCATTER PLOT ================= */

function plotKinomeScatter(cellLine, geneFilter) {

  const idx = kinases.cellLines.indexOf(cellLine);
  if (idx === -1) return;

  const geneUpper = geneFilter ? geneFilter.toUpperCase() : null;

  const normal = [];
  const highlight = [];

  kinases.datasets.forEach(d => {
    const point = {
      name: d.genenames,
      x: d.SKEW[idx],
      y: d.Cscore[idx]
    };

    if (geneUpper && d.genenames.toUpperCase() === geneUpper) {
      highlight.push(point);
    } else {
      normal.push(point);
    }
  });

  const traceNormal = {
    x: normal.map(p => p.x),
    y: normal.map(p => p.y),
    text: normal.map(p => p.name),
    mode: "markers",
    type: "scatter",
    showlegend: false, 
    marker: {
      size: 6,
      opacity: 0.5,
      color: "gray"
    },
    hovertemplate:
      "%{text}<br>SKEW: %{x}<br>Cscore: %{y}<extra></extra>"
  };

  const traceHighlight = {
    x: highlight.map(p => p.x),
    y: highlight.map(p => p.y),
    text: highlight.map(p => p.name),
    mode: "markers",
    type: "scatter",
    name: geneFilter || "Selected gene", 
    marker: {
      size: 10,
      color: "red"
    },
    textposition: "top center",
    hovertemplate:
      "%{text}<br>SKEW: %{x}<br>Cscore: %{y}<extra></extra>"
  };

const layout = {
  title: `Kinome Scatter (${cellLine})`,
  xaxis: { 
    title: "SKEW",
    range: [0, 1]  },
  yaxis: { 
    title: "Cscore"
  },
  autosize: true,
  shapes: [
    {
      type: "line",
      yref: "paper",   // span entire width
      y0: 0,
      y1: 1,
      xref: "y",
      x0: 0.5,
      x1: 0.5,
      line: {
        color: "black",
        width: 2,
        dash: "dash"
      }
    }
  ]
}

  Plotly.newPlot("scatterKinome", [traceNormal, traceHighlight], layout);
}

function getCellLineColor(cellLine) {
  for (const [lineage, cells] of Object.entries(lineageMap)) {
    if (cells.includes(cellLine)) {
      return lineageColors[lineage];
    }
  }
  return "#999"; // fallback color
}

function plotSingleKinaseScatter() {

    const genename_prot = document.getElementById("gene_name_prot").value.trim();

  if (!genename_prot) return;

  const gene = genename_prot.toUpperCase();

  const entry = kinases.datasets.find(d =>
    d.genenames.toUpperCase() === gene ||
    d.protnames.toUpperCase() === gene
  );

  if (!entry) {
    console.warn("Gene not found:", gene);
    return;
  }

  const x = entry.SKEW;
  const y = entry.Cscore;
  const labels = kinases.cellLines;

  // assign color per cell line
  const colors = labels.map(cl => getCellLineColor(cl));

const traces = [];

Object.entries(lineageMap).forEach(([lineage, cells]) => {

  const indices = labels
    .map((cl, i) => cells.includes(cl) ? i : -1)
    .filter(i => i !== -1);

  if (indices.length === 0) return;

  traces.push({
    x: indices.map(i => x[i]),
    y: indices.map(i => y[i]),
    text: indices.map(i => labels[i]),
    mode: "markers",
    type: "scatter",
    name: lineage,  // this creates legend
    marker: {
      size: 10,
      color: lineageColors[lineage]
    },
    hovertemplate:

});
